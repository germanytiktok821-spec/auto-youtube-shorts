name: Auto YouTube Shorts

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libraries
        run: |
          python -m pip install --upgrade pip
          pip install gTTS
          pip install moviepy
          pip install imageio[ffmpeg]

      - name: Run script
        run: python main.py
