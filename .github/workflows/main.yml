name: Auto YouTube Shorts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gTTS moviepy imageio imageio-ffmpeg

      - name: Install ffmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: Run script
        run: python main.py
